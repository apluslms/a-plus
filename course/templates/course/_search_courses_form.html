{% load i18n %}
{% load course %}

{% load static %}
{% block scripts %}

<script src="{% static 'course/course_search.js' %}"></script>

{% endblock %}

<form method="get" class="form-inline course-search-form" id="course-search-form">
    <div class="form-group search-wrapper">
      <input type="text" name="q" id="search-input"
             class="form-control"
             style="width: 60rem;"
             placeholder="{% translate 'SEARCH_COURSES' %}"
             value="{{ request.GET.q }}" autocomplete="off" />
  
      {% if request.GET.q %}
        <span id="clear-search" class="clear-icon" style="cursor: pointer;">&times;</span>
      {% endif %}
    </div>
    <button type="submit" class="btn btn-primary">{% translate 'SEARCH' %}</button>
  </form>
